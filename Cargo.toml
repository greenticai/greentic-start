[package]
name = "greentic-start"
version = "0.4.16"
edition = "2024"
rust-version = "1.91"
description = "Greentic lifecycle runner for start/restart/stop orchestration"
license = "MIT"
repository = "https://github.com/greenticai/greentic-start"
homepage = "https://github.com/greenticai/greentic-start"
readme = "README.md"
keywords = ["greentic", "cli", "lifecycle", "orchestration"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
chrono = "0.4"
clap = { version = "4.5", features = ["derive"] }
flate2 = "1"
greentic-distributor-client = { version = "0.4", default-features = false, features = ["pack-fetch"] }
greentic-i18n = "0.4"
greentic-setup = { version = "0.4" }
greentic-runner-desktop = { version = "0.4" }
greentic-runner-host = { version = "0.4" }
greentic-secrets-lib = { version = "0.4", features = ["providers-dev"] }
greentic-types = { version = "0.4", features = ["serde"] }
http-body-util = "0.1"
hyper = { version = "1", features = ["full"] }
hyper-util = "0.1"
include_dir = "0.7"
jsonschema = "0.44"
libc = "0.2"
once_cell = "1.21"
qa-spec = "0.4"
rand = "0.10"
rpassword = "7"
rustls = "0.23"
rustls-pemfile = "2"
semver = "1"
serde = { version = "1.0", features = ["derive"] }
serde_cbor = "0.11"
serde_json = "1.0"
serde_yaml_bw = { package = "serde_yaml_gtc", version = "2.5.2" }
sys-locale = "0.3"
sysinfo = "0.38"
sha2 = "0.10"
tokio = { version = "1", features = ["rt-multi-thread", "signal", "sync", "net"] }
tokio-rustls = "0.26"
tar = "0.4"
tracing = "0.1"
unic-langid = "0.9"
ureq = { version = "3", features = ["json"] }
uuid = { version = "1", features = ["v4"] }
zip = "8"
zstd = "0.13"

[dev-dependencies]
tempfile = "3"
