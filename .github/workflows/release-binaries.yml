name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    uses: greenticai/.github/.github/workflows/release-binaries.yml@main
    with:
      package: greentic-start
      binary: greentic-start
      extra-files: |
        README.md
        LICENSE
    secrets: inherit
