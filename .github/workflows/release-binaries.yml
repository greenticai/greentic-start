name: Release Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref_type == 'tag'
    uses: greenticai/.github/.github/workflows/release-binaries.yml@main
    with:
      package: greentic-start
      binary: greentic-start
      windows-archive-format: zip
      extra-files: |
        README.md
        LICENSE
    secrets: inherit

  publish_crates:
    if: github.ref_type == 'tag'
    name: Publish to crates.io
    needs: [release]
    permissions:
      contents: read
    uses: greenticai/.github/.github/workflows/crates-publish.yml@main
    with:
      crates: "greentic-start"
    secrets: inherit
