name: CI
on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/host-crate-ci.yml@main
    with:
      clippy-args: "-p greentic-start --all-targets --all-features -- -D warnings"
      test-args: "-p greentic-start --all-features"
