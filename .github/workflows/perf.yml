name: Perf (lightweight)
# Moved off pull_request onto a nightly schedule. See plans/binary-bifurcation.md
# Phase A (heavy-job sweep). Manual runs remain via workflow_dispatch. push
# trigger preserved so main-merge still catches regressions immediately.

on:
  schedule:
    - cron: "16 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  perf:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Run perf guard tests
        run: cargo test --test perf_scaling --test perf_timeout

      - name: Run benchmarks (smoke)
        run: cargo bench --bench perf -- --sample-size 10
