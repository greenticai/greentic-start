name: publish-distroless

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)build (e.g. v0.5.18)"
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ inputs.tag || '' }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish-distroless:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve build ref
        id: ref
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-].+)?$ ]]; then
              echo "::error::workflow_dispatch input.tag must match v<MAJOR>.<MINOR>.<PATCH>; got '$tag'"
              exit 1
            fi
          else
            tag="${{ github.ref_name }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - name: Validate Cargo.toml version matches tag
        run: |
          set -euo pipefail
          cargo_version=$(awk -F\" '/^version *=/ {print $2; exit}' Cargo.toml)
          tag_version="${{ steps.ref.outputs.version }}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::tag ${{ steps.ref.outputs.tag }} does not match Cargo.toml version $cargo_version (refusing to retag :latest with mismatched build)"
            exit 1
          fi
          echo "Cargo.toml version $cargo_version matches tag ${{ steps.ref.outputs.tag }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/greenticai/greentic-start-distroless
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.ref.outputs.tag }}
            type=raw,value=${{ steps.ref.outputs.version }}

      - name: Build and push distroless greentic-start image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.distroless
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
